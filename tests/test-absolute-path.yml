name: Test absolute directory path
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run aislop with absolute path to fixture directory
        id: action
        uses: .
        with:
          directory: ${{ github.workspace }}/tests/fixtures/aislop-config
          format: json
          version: latest

      - name: Assert scan completed successfully with absolute path
        run: |
          echo "PASS: aislop ci completed without error using absolute path (exit 0)"
