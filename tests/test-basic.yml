name: Test basic usage (JSON format, default directory)
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run aislop on fixture directory (JSON format)
        id: action
        uses: .
        with:
          directory: tests/fixtures/aislop-config
          format: json
          version: latest

      - name: Assert scan completed successfully
        run: |
          echo "PASS: aislop ci completed without error (exit 0)"
