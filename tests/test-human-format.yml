name: Test human output format
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create scan target directory with aislop config
        run: |
          mkdir -p "$GITHUB_WORKSPACE/tests/fixtures/scan-human/.aislop"
          cat > "$GITHUB_WORKSPACE/tests/fixtures/scan-human/.aislop/config.yml" <<'EOF'
          version: 1
          engines:
            format: false
            lint: false
            code-quality: false
            ai-slop: true
            architecture: false
            security: false
          ci:
            failBelow: 0
            format: json
          EOF
          # Write a minimal JS file to scan
          cat > "$GITHUB_WORKSPACE/tests/fixtures/scan-human/index.js" <<'EOF'
          function add(a, b) {
            return a + b;
          }
          module.exports = { add };
          EOF

      - id: action
        uses: .
        with:
          directory: tests/fixtures/scan-human
          format: human

      - name: Assert action completed successfully with human format
        run: |
          echo "Action completed with exit code 0 using human format"
          echo "PASS"
