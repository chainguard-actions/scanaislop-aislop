name: Test human output format
on:
  workflow_dispatch:

jobs:
  test-human-format:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run aislop with human format
        id: action
        uses: .
        with:
          directory: tests/fixtures/sample-project
          format: human
          version: latest

      - name: Assert aislop ran successfully with human format
        run: |
          echo "aislop ci with --human flag completed without error"
          echo "PASS"
