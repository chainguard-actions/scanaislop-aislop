name: Test human output format
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run aislop with human format on fixture directory
        id: action
        uses: .
        with:
          directory: tests/fixtures/aislop-config
          format: human
          version: latest

      - name: Assert scan completed successfully with human format
        run: |
          echo "PASS: aislop ci --human completed without error (exit 0)"
