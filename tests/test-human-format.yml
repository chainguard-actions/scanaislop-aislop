name: Test human format output
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create scan target with permissive aislop config
        run: |
          mkdir -p "$GITHUB_WORKSPACE/tests/fixtures/human-scan/.aislop"
          cat > "$GITHUB_WORKSPACE/tests/fixtures/human-scan/.aislop/config.yml" <<'EOF'
          version: 1
          engines:
            format: false
            lint: false
            code-quality: false
            ai-slop: false
            architecture: false
            security: false
          ci:
            failBelow: 0
            format: human
          EOF
          # Create a minimal JS file to scan
          cat > "$GITHUB_WORKSPACE/tests/fixtures/human-scan/hello.js" <<'EOF'
          // Simple hello world
          function hello() {
            return "hello world";
          }
          module.exports = { hello };
          EOF

      - id: action
        uses: .
        with:
          directory: tests/fixtures/human-scan
          format: human
          version: latest

      - name: Assert action completed successfully with human format
        run: |
          echo "Action completed with human format — PASS"
