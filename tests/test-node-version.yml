name: Test custom Node.js version
on:
  workflow_dispatch:

jobs:
  test-node-version:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run aislop with explicit Node.js version
        id: action
        uses: .
        with:
          directory: tests/fixtures/sample-project
          node-version: "20"
          format: json
          version: latest

      - name: Assert Node.js version was set and aislop ran
        run: |
          NODE_VER=$(node --version)
          echo "Node.js version: $NODE_VER"
          if [[ "$NODE_VER" != v20* ]]; then
            echo "FAIL: expected Node.js v20.x, got $NODE_VER"
            exit 1
          fi
          echo "PASS: Node.js version is $NODE_VER"
