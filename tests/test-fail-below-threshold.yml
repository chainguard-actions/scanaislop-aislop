name: Test fail-below threshold enforcement
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create scan target with high failBelow threshold
        run: |
          mkdir -p "$GITHUB_WORKSPACE/tests/fixtures/scan-threshold/.aislop"
          # Set failBelow: 101 (impossible to reach) so aislop ci always exits 1
          cat > "$GITHUB_WORKSPACE/tests/fixtures/scan-threshold/.aislop/config.yml" <<'EOF'
          version: 1
          engines:
            format: false
            lint: false
            code-quality: false
            ai-slop: true
            architecture: false
            security: false
          ci:
            failBelow: 101
            format: json
          EOF
          # Write a minimal JS file to scan
          cat > "$GITHUB_WORKSPACE/tests/fixtures/scan-threshold/index.js" <<'EOF'
          function hello() {
            return "hello";
          }
          module.exports = { hello };
          EOF

      - id: action
        uses: .
        with:
          directory: tests/fixtures/scan-threshold
          format: json
        continue-on-error: true

      - name: Assert action failed due to score below threshold
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail when score < failBelow threshold, but outcome was '$OUTCOME'"
            exit 1
          fi
          echo "PASS: action correctly failed when score was below threshold"
