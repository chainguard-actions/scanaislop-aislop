name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm vitest run

      - name: Self-scan
        run: node dist/cli.js scan . --json
        env:
          AISLOP_NO_HISTORY: "1"
          AISLOP_NO_TELEMETRY: "1"
          AISLOP_NO_UPDATE_NOTIFIER: "1"
          DO_NOT_TRACK: "1"

      - name: Publish to npm
        run: npm publish --access public

  publish-gpr:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    needs: publish-npm
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24
          package-manager-cache: false
          registry-url: https://npm.pkg.github.com
          scope: '@scanaislop'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Set scoped package name
        run: npm pkg set name="@scanaislop/aislop"

      - name: Publish to GitHub Packages
        run: npm publish --access public --registry=https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  move-major-tag:
    name: Move v1 Action tag to this release
    runs-on: ubuntu-latest
    needs: publish-npm
    if: ${{ !github.event.release.prerelease }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Re-point v1 to ${{ github.event.release.tag_name }}
        run: |
          git tag -f v1
          git push origin v1 --force
